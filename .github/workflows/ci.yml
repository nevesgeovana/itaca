# Continuous integration (REQ-95): ruff check, ruff format --check,
# mypy --strict on the public API, pytest with the 90 percent coverage
# gate (REQ-75). Tests run against the minimum and the latest compatible
# dependency versions (REQ-83).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: mypy strict
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
        deps: [latest, minimum]
        exclude:
          # NumPy 1.26 has no Python 3.13 wheels; the minimum floor is
          # exercised on the oldest supported interpreter.
          - python-version: "3.13"
            deps: minimum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pandas]"
      - name: Pin minimum dependency versions
        if: matrix.deps == 'minimum'
        run: pip install "numpy==1.26.*" "pandas==2.1.*"
      - name: pytest with coverage gate
        run: pytest
