# Local CI mirror (REQ-96): ruff check, ruff format, mypy, fast pytest.
# Install once with: pre-commit install
#
# Keep the ruff rev below equal to the ruff pin in the pyproject [dev]
# extra; the bump procedure is documented there.
# tests/test_tooling_config.py fails if they drift apart.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (public API)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest-fast
        name: pytest -x (fast, no coverage; CI enforces the gate)
        entry: pytest -x -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
